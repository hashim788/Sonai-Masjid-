<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonai Masjid - Campaign Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="https://static.filestackapi.com/filestack-js/3.x.x/filestack.min.js"></script>

    <style>
        :root { --green: #0b4627; --light-green: #e8f5e9; --gold: #d4af37; --text: #333; --white: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background: #fdfaf4; color: var(--text); padding-bottom: 80px; }

        /* Header Section */
        .main-header { background: var(--green); color: var(--white); text-align: center; padding: 40px 20px; border-radius: 0 0 30px 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .mosque-icon { font-size: 40px; margin-bottom: 10px; }
        .sync-badge { background: #2ecc71; color: white; padding: 5px 15px; border-radius: 20px; font-size: 12px; display: inline-block; margin: 10px 0; }

        /* Navigation Tabs */
        .nav-tabs { display: flex; background: #eee; margin: 20px; border-radius: 15px; padding: 5px; }
        .nav-tab { flex: 1; text-align: center; padding: 12px; border-radius: 12px; font-weight: 600; cursor: pointer; color: #666; transition: 0.3s; }
        .nav-tab.active { background: var(--white); color: var(--green); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        /* Campaign Card Style (As per your Screenshot) */
        .campaign-card { background: var(--white); margin: 15px; padding: 20px; border-radius: 25px; box-shadow: 0 8px 25px rgba(0,0,0,0.05); position: relative; border: 1px solid #eee; }
        .camp-title { font-size: 20px; font-weight: 800; color: var(--green); margin-bottom: 5px; }
        .camp-desc { font-size: 13px; color: #777; margin-bottom: 15px; line-height: 1.4; }
        .status-pill { position: absolute; top: 20px; right: 20px; background: #e8f5e9; color: #27ae60; padding: 5px 12px; border-radius: 15px; font-size: 11px; font-weight: bold; display: flex; align-items: center; gap: 5px; }
        
        .progress-container { background: #eee; height: 10px; border-radius: 10px; margin: 15px 0; overflow: hidden; }
        .progress-bar { background: var(--green); height: 100%; border-radius: 10px; transition: 0.5s; }
        
        .camp-stats { display: flex; justify-content: space-between; margin-top: 15px; text-align: center; }
        .stat-item h4 { font-size: 18px; color: var(--green); }
        .stat-item p { font-size: 11px; color: #999; text-transform: uppercase; }

        /* Member List Style */
        .member-card { background: var(--white); margin: 10px 15px; padding: 15px; border-radius: 20px; display: flex; align-items: center; gap: 15px; border: 1px solid #f0f0f0; }
        .m-avatar { width: 55px; height: 55px; border-radius: 50%; background: #f0f0f0; display: flex; align-items: center; justify-content: center; font-weight: bold; color: var(--green); border: 2px solid var(--gold); object-fit: cover; }
        .m-details { flex: 1; }
        .m-details h4 { font-size: 15px; color: var(--green); }
        .m-details p { font-size: 13px; color: #555; font-weight: 600; }
        .pay-status { padding: 6px 12px; border-radius: 10px; font-size: 11px; font-weight: bold; }
        .status-paid { background: #e8f5e9; color: #27ae60; }
        .status-pending { background: #fff3e0; color: #e67e22; }

        /* Admin Section */
        #ADMIN_PANEL { display: none; background: #fff; margin: 15px; padding: 25px; border-radius: 25px; border: 2px solid var(--gold); }
        input, select, textarea { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #ddd; outline: none; }
        .btn-main { width: 100%; padding: 16px; background: var(--green); color: white; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; }

        /* Hidden Utility */
        .hidden { display: none !important; }
        .back-btn { margin: 15px; color: #3498db; cursor: pointer; display: inline-block; font-weight: bold; }
        
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .modal { background: white; padding: 30px; border-radius: 30px; width: 100%; max-width: 400px; text-align: center; }
    </style>
</head>
<body>

<div class="main-header">
    <div class="mosque-icon">🕌</div>
    <h1>Sonai Masjid</h1>
    <p>Campaign & Collection Manager</p>
    <div class="sync-badge">🔴 Live Sync Active</div>
</div>

<div class="nav-tabs" id="NAV_TABS">
    <div class="nav-tab active" onclick="showSection('campaigns', this)">📋 Campaigns</div>
    <div class="nav-tab" onclick="showSection('members', this)">👥 All Members</div>
    <div class="nav-tab" onclick="openLogin()">🔐 Admin</div>
</div>

<div id="ADMIN_PANEL">
    <h3 style="color:var(--green)">➕ Create New Campaign</h3>
    <input type="text" id="C_NAME" placeholder="Campaign Title (e.g., Chappal Stand)">
    <textarea id="C_DESC" placeholder="Description of work..."></textarea>
    <input type="number" id="C_GOAL" placeholder="Target Amount (e.g., 20000)">
    <button class="btn-main" onclick="saveCampaign()">Create Campaign</button>
    <hr style="margin:20px 0; border:0; border-top:1px dashed #ccc;">
    <h3 style="color:var(--green)">👤 Add Member to Campaign</h3>
    <select id="TARGET_CAMP"></select>
    <input type="text" id="M_NAME" placeholder="Member Name">
    <input type="number" id="M_PHONE" placeholder="Phone Number">
    <input type="number" id="M_AMT" placeholder="Initial Amount (₹)">
    <button class="btn-main" style="background:var(--gold)" onclick="saveMember()">Add Member</button>
</div>

<div id="CAMPAIGN_VIEW"></div>
<div id="MEMBER_VIEW" class="hidden">
    <div id="SINGLE_CAMP_HEADER"></div>
    <div class="nav-tabs">
        <div class="nav-tab active" onclick="filterMembers('all')">Sab</div>
        <div class="nav-tab" onclick="filterMembers('pending')">⏳ Pending</div>
        <div class="nav-tab" onclick="filterMembers('paid')">✅ Paid</div>
    </div>
    <div id="MEMBER_LIST"></div>
</div>

<div id="LOGIN_MODAL" class="overlay hidden">
    <div class="modal">
        <h2>Admin Login</h2>
        <input type="password" id="ADMIN_PIN" placeholder="Enter 6-Digit PIN">
        <button class="btn-main" onclick="checkPin()">Access</button>
        <p onclick="closeModals()" style="margin-top:15px; color:gray; cursor:pointer;">Close</p>
    </div>
</div>

<script>
// Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyBELYt4Rfu5vmoJzR9hfxkbSEER4XErIoU",
  authDomain: "sonai-masjid.firebaseapp.com",
  projectId: "sonai-masjid",
  storageBucket: "sonai-masjid.firebasestorage.app",
  messagingSenderId: "680124332445",
  appId: "1:680124332445:web:e5ce79dc635f971f035774"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let campaigns = [];
let members = [];
let activeCampId = null;
let isAdmin = false;

// 1. Load Data
function loadData() {
    db.collection("campaigns").onSnapshot(snap => {
        campaigns = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
        renderCampaigns();
        updateAdminDropdown();
    });
    db.collection("members").onSnapshot(snap => {
        members = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
        if(activeCampId) renderMembers(activeCampId);
    });
}

// 2. Render Campaigns
function renderCampaigns() {
    const view = document.getElementById('CAMPAIGN_VIEW');
    view.innerHTML = campaigns.map(c => {
        const campMembers = members.filter(m => m.campId === c.id);
        const collected = campMembers.reduce((s, m) => s + (Number(m.paidAmount) || 0), 0);
        const percent = Math.min(Math.round((collected / c.goal) * 100), 100);
        const paidCount = campMembers.filter(m => m.paidAmount > 0).length;
        const pendingCount = campMembers.length - paidCount;

        return `
            <div class="campaign-card" onclick="openCampaign('${c.id}')">
                <div class="status-pill">🟢 Active</div>
                <h2 class="camp-title">${c.name}</h2>
                <p class="camp-desc">${c.desc}</p>
                <div style="display:flex; justify-content:space-between; font-size:12px; font-weight:bold;">
                    <span>₹${collected.toLocaleString()} / ₹${c.goal.toLocaleString()}</span>
                    <span>${percent}%</span>
                </div>
                <div class="progress-container">
                    <div class="progress-bar" style="width:${percent}%"></div>
                </div>
                <div class="camp-stats">
                    <div class="stat-item"><h4>₹${collected}</h4><p>Collected</p></div>
                    <div class="stat-item"><h4>${paidCount}</h4><p>Paid ✅</p></div>
                    <div class="stat-item"><h4>${pendingCount}</h4><p>Pending ⏳</p></div>
                </div>
            </div>
        `;
    }).join('');
}

// 3. Render Members inside Campaign
function openCampaign(id) {
    activeCampId = id;
    document.getElementById('CAMPAIGN_VIEW').classList.add('hidden');
    document.getElementById('MEMBER_VIEW').classList.remove('hidden');
    renderMembers(id);
}

function renderMembers(campId, filter = 'all') {
    let list = members.filter(m => m.campId === campId);
    if(filter === 'paid') list = list.filter(m => m.paidAmount > 0);
    if(filter === 'pending') list = list.filter(m => m.paidAmount <= 0);

    const listDiv = document.getElementById('MEMBER_LIST');
    listDiv.innerHTML = `<div class="back-btn" onclick="goHome()">← Wapas</div>` + list.map(m => `
        <div class="member-card">
            <div class="m-avatar">${m.name.charAt(0)}</div>
            <div class="m-details">
                <h4>${m.name}</h4>
                <p>₹${m.paidAmount || 0}</p>
            </div>
            <div class="pay-status ${m.paidAmount > 0 ? 'status-paid' : 'status-pending'}">
                ${m.paidAmount > 0 ? '✅ Paid' : '⏳ Pending'}
            </div>
        </div>
    `).join('');
}

// 4. Admin Logic
function checkPin() {
    if(document.getElementById('ADMIN_PIN').value === 'masjid786') {
        isAdmin = true;
        document.getElementById('ADMIN_PANEL').style.display = 'block';
        closeModals();
        alert("Welcome Admin!");
    } else { alert("Wrong PIN!"); }
}

async function saveCampaign() {
    const name = document.getElementById('C_NAME').value;
    const desc = document.getElementById('C_DESC').value;
    const goal = Number(document.getElementById('C_GOAL').value);
    if(!name || !goal) return alert("Details bhariye!");
    await db.collection("campaigns").add({ name, desc, goal, time: Date.now() });
    alert("Campaign Created!");
}

async function saveMember() {
    const campId = document.getElementById('TARGET_CAMP').value;
    const name = document.getElementById('M_NAME').value;
    const phone = document.getElementById('M_PHONE').value;
    const paidAmount = Number(document.getElementById('M_AMT').value);
    if(!name || !campId) return alert("Member details complete kijiye!");
    await db.collection("members").add({ campId, name, phone, paidAmount, time: Date.now() });
    alert("Member Added!");
}

function updateAdminDropdown() {
    const sel = document.getElementById('TARGET_CAMP');
    sel.innerHTML = campaigns.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
}

// Helper Functions
function showSection(sec, btn) {
    if(sec === 'campaigns') goHome();
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
}
function goHome() {
    activeCampId = null;
    document.getElementById('CAMPAIGN_VIEW').classList.remove('hidden');
    document.getElementById('MEMBER_VIEW').classList.add('hidden');
}
function openLogin() { document.getElementById('LOGIN_MODAL').classList.remove('hidden'); }
function closeModals() { document.getElementById('LOGIN_MODAL').classList.add('hidden'); }
function filterMembers(f) { renderMembers(activeCampId, f); }

window.onload = loadData;
</script>
</body>
</html>
