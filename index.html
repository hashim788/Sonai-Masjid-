<!DOCTYPE html>
<html lang="ur">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sonai Masjid - Official Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://static.filestackapi.com/filestack-js/3.x.x/filestack.min.js"></script>

<style>
:root { --green: #062a18; --gold: #d4af37; --white: #ffffff; --bg: #f4f7f6; --red: #e74c3c; }
* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
body { background: var(--bg); color: #333; overflow-x: hidden; padding-bottom: 100px; }

#splash { position: fixed; inset: 0; background: var(--green); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; color: var(--gold); transition: 0.8s; }
.spinner { width: 40px; height: 40px; border: 4px solid rgba(212, 175, 55, 0.2); border-top: 4px solid var(--gold); border-radius: 50%; animation: spin 1s linear infinite; margin-top: 15px; }
@keyframes spin { 100% { transform: rotate(360deg); } }

.hdr { background: linear-gradient(135deg, var(--green), #0b4627); padding: 30px 20px; text-align: center; color: var(--gold); border-radius: 0 0 30px 30px; }
.ticker-wrap { background: #0b4627; color: var(--gold); padding: 8px 0; overflow: hidden; font-size: 12px; font-weight: bold; border-bottom: 2px solid var(--gold); }
.ticker { display: flex; white-space: nowrap; animation: ticker 25s linear infinite; }
@keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

.camp-card { background: linear-gradient(135deg, var(--gold), #b8860b); margin: 15px; padding: 20px; border-radius: 20px; color: var(--green); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
.progress-bar { background: rgba(255,255,255,0.3); height: 10px; border-radius: 10px; margin: 10px 0; overflow: hidden; }
.progress-fill { background: var(--green); height: 100%; transition: 0.5s; }

.search-box { margin: -20px 20px 10px; z-index: 10; position: relative; }
.search-box input { width: 100%; padding: 15px 25px; border-radius: 50px; border: none; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }

.filter-nav { display: flex; padding: 10px 15px; gap: 8px; overflow-x: auto; scrollbar-width: none; }
.f-btn { padding: 10px 18px; border-radius: 20px; background: var(--white); border: 1.5px solid var(--green); color: var(--green); font-size: 12px; font-weight: 700; cursor: pointer; white-space: nowrap; }
.f-btn.active { background: var(--green); color: var(--gold); }

.card { background: var(--white); margin: 10px 15px; padding: 12px; border-radius: 15px; display: flex; align-items: center; gap: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
.m-img { width: 55px; height: 55px; border-radius: 50%; object-fit: cover; border: 2px solid var(--gold); }
.m-info { flex: 1; }
.m-info h4 { font-size: 14px; color: var(--green); }
.m-amt { font-weight: 800; color: var(--green); font-size: 15px; }

.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
.modal { background: white; width: 100%; max-width: 400px; padding: 25px; border-radius: 25px; max-height: 90vh; overflow-y: auto; }
input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #ddd; outline: none; }
.primary-btn { width: 100%; padding: 14px; background: var(--green); color: var(--gold); border: none; border-radius: 12px; font-weight: bold; margin-top: 10px; cursor: pointer; }

.btm-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; padding: 12px 0; box-shadow: 0 -5px 15px rgba(0,0,0,0.08); z-index: 1000; }
.nav-item { flex: 1; text-align: center; font-size: 11px; color: #999; cursor: pointer; }
.nav-item.active { color: var(--green); font-weight: bold; }
.hidden { display: none !important; }
</style>
</head>
<body>

<div id="splash">
    <h1 style="font-family:'Amiri'; font-size: 35px;">Sonai Masjid</h1>
    <p>بِسْمِ اللهِ الرَّحْمٰنِ الرَّحِيْمِ</p>
    <div class="spinner"></div>
</div>

<div class="ticker-wrap"><div class="ticker" id="LIVE_TICKER">Portal is live... Welcome to Sonai Masjid.</div></div>

<div class="hdr">
    <h2 style="font-family:'Amiri'; font-size: 28px;">Sonai Masjid Portal</h2>
    <div id="STATS_TOP" style="font-size: 12px; margin-top: 8px; opacity: 0.9;">Loading Statistics...</div>
</div>

<div id="CAMPAIGN_DISPLAY"></div>

<div class="search-box">
    <input type="text" id="SEARCH_INPUT" placeholder="Search name or number..." oninput="renderList()">
</div>

<div class="filter-nav">
    <button class="f-btn active" onclick="setFilter('all', this)">All Members</button>
    <button class="f-btn" onclick="setFilter('paid', this)">✅ Paid</button>
    <button class="f-btn" onclick="setFilter('unpaid', this)">❌ Pending</button>
    <button class="f-btn" onclick="setFilter('admin', this)" id="ADMIN_TAB_BTN" class="hidden">⚙️ Admin Panel</button>
</div>

<div id="LIST_CONTAINER"></div>

<div id="ADMIN_PANEL" class="hidden" style="padding: 15px;">
    <div style="background: white; padding: 20px; border-radius: 20px; border: 2px solid var(--gold);">
        <h3 style="color: var(--green);">➕ Add New Member</h3>
        <input type="text" id="NEW_M_NAME" placeholder="Full Name">
        <input type="number" id="NEW_M_PHONE" placeholder="Mobile Number">
        <button class="primary-btn" onclick="saveNewMember()">🚀 Save Member</button>
        
        <hr style="margin: 20px 0; opacity: 0.1;">
        
        <h3 style="color: var(--green);">📁 Start New Campaign</h3>
        <input type="text" id="CAMP_NAME" placeholder="Campaign Name (e.g. Roof Work)">
        <input type="number" id="CAMP_GOAL" placeholder="Target Amount (₹)">
        <input type="date" id="CAMP_DATE" placeholder="Last Date">
        <button class="primary-btn" style="background:var(--gold); color:var(--green);" onclick="saveCampaign()">✨ Launch Campaign</button>
    </div>
</div>

<div id="LOGIN_MODAL" class="overlay hidden">
    <div class="modal">
        <h3 style="margin-bottom:15px;">Admin Login</h3>
        <input type="password" id="ADMIN_PIN" placeholder="Enter PIN">
        <button class="primary-btn" onclick="handleLogin()">Login</button>
        <button onclick="closeModals()" style="background:none; border:none; margin-top:15px; color:gray; width:100%;">Cancel</button>
    </div>
</div>

<div id="EDIT_MODAL" class="overlay hidden">
    <div class="modal">
        <h3>Update Contribution</h3>
        <input type="hidden" id="EDIT_ID">
        <p id="EDIT_NAME_LBL" style="margin:10px 0; font-weight:bold; color:var(--green);"></p>
        <input type="number" id="EDIT_AMT" placeholder="Enter Paid Amount">
        <button class="f-btn" style="width:100%; margin:10px 0;" onclick="uploadPhoto()">Change Photo</button>
        <input type="hidden" id="EDIT_IMG_URL">
        <button class="primary-btn" onclick="updateMember()">Save Data</button>
        <button onclick="closeModals()" style="background:none; border:none; margin-top:10px; color:gray; width:100%;">Close</button>
    </div>
</div>

<div class="btm-nav">
    <div class="nav-item active" onclick="showSection('home')">🏠 Home</div>
    <div class="nav-item" onclick="alert('Payment Gateway Integration Pending')">💳 Donate</div>
    <div id="ADMIN_NAV_TEXT" class="nav-item" onclick="openLogin()">⚙️ Admin</div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBELYt4Rfu5vmoJzR9hfxkbSEER4XErIoU",
  authDomain: "sonai-masjid.firebaseapp.com",
  projectId: "sonai-masjid",
  storageBucket: "sonai-masjid.firebasestorage.app",
  messagingSenderId: "680124332445",
  appId: "1:680124332445:web:e5ce79dc635f971f035774"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const client = filestack.init('A8v0D5L4SiaWz9vW6p8Kgz');

let allMembers = [];
let currentCampaign = null;
let currentFilter = 'all';
let isAdmin = false;

window.onload = () => {
    setTimeout(() => { 
        document.getElementById('splash').style.opacity = '0';
        setTimeout(() => document.getElementById('splash').style.display = 'none', 800);
    }, 1500);
    fetchData();
};

function fetchData() {
    // Listen for Members
    db.collection("members").onSnapshot(snap => {
        allMembers = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        renderList();
        updateStats();
        updateTicker();
    });
    // Listen for Active Campaign
    db.collection("campaigns").orderBy("time", "desc").limit(1).onSnapshot(snap => {
        if(!snap.empty) {
            currentCampaign = { id: snap.docs[0].id, ...snap.docs[0].data() };
            renderCampaign();
        }
    });
}

function renderCampaign() {
    if(!currentCampaign) return;
    let totalCollected = allMembers.reduce((s, m) => s + (Number(m.paidAmount) || 0), 0);
    let percent = Math.min((totalCollected / currentCampaign.goal) * 100, 100).toFixed(1);
    
    document.getElementById('CAMPAIGN_DISPLAY').innerHTML = `
        <div class="camp-card">
            <h4 style="font-size:18px;">🌙 ${currentCampaign.name}</h4>
            <p style="font-size:12px; margin-bottom:10px;">Target: ₹${currentCampaign.goal} | Ends: ${currentCampaign.endDate}</p>
            <div class="progress-bar"><div class="progress-fill" style="width:${percent}%"></div></div>
            <div style="display:flex; justify-content:space-between; font-size:13px; font-weight:bold;">
                <span>Collected: ₹${totalCollected}</span>
                <span>${percent}%</span>
            </div>
        </div>
    `;
}

function renderList() {
    if(currentFilter === 'admin') return;

    let term = document.getElementById('SEARCH_INPUT').value.toLowerCase();
    let filtered = allMembers.filter(m => m.name.toLowerCase().includes(term) || m.phone.includes(term));
    
    if(currentFilter === 'paid') filtered = filtered.filter(m => m.paidAmount > 0);
    if(currentFilter === 'unpaid') filtered = filtered.filter(m => m.paidAmount === 0);

    filtered.sort((a,b) => (b.paidAmount > 0) - (a.paidAmount > 0));

    let html = filtered.map(m => `
        <div class="card">
            <img src="${m.photo || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}" class="m-img" onclick="triggerEdit('${m.id}')">
            <div class="m-info">
                <h4>${m.name}</h4>
                <p style="font-size:10px; color:#888;">📞 ${m.phone.substring(0,6)}****</p>
                <p style="font-size:11px; font-weight:bold; color:${m.paidAmount > 0 ? 'green' : 'red'}">
                    ${m.paidAmount > 0 ? 'Verified Donor' : 'Pending'}
                </p>
            </div>
            <div class="m-amt">₹${m.paidAmount || 0}</div>
        </div>
    `).join('');
    document.getElementById('LIST_CONTAINER').innerHTML = html || `<p style="text-align:center; padding:50px; color:#aaa;">No data found</p>`;
}

function setFilter(f, btn) {
    currentFilter = f;
    document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    
    if(f === 'admin') {
        document.getElementById('LIST_CONTAINER').classList.add('hidden');
        document.getElementById('ADMIN_PANEL').classList.remove('hidden');
    } else {
        document.getElementById('LIST_CONTAINER').classList.remove('hidden');
        document.getElementById('ADMIN_PANEL').classList.add('hidden');
        renderList();
    }
}

function updateStats() {
    let total = allMembers.reduce((s, m) => s + (Number(m.paidAmount) || 0), 0);
    document.getElementById('STATS_TOP').innerText = `Total Collection: ₹${total} | Donors: ${allMembers.filter(m=>m.paidAmount>0).length}`;
}

function updateTicker() {
    let recent = allMembers.filter(m => m.paidAmount > 0).slice(-5);
    document.getElementById('LIVE_TICKER').innerText = recent.length ? 
        recent.map(m => `⭐ ${m.name} donated ₹${m.paidAmount}`).join(' --- ') : "Welcome to Sonai Masjid Portal";
}

// ADMIN ACTIONS
function openLogin() { if(!isAdmin) document.getElementById('LOGIN_MODAL').classList.remove('hidden'); else alert("Already Logged in"); }
function closeModals() { document.querySelectorAll('.overlay').forEach(o => o.classList.add('hidden')); }

function handleLogin() {
    if(document.getElementById('ADMIN_PIN').value === "masjid786") {
        isAdmin = true;
        document.getElementById('ADMIN_NAV_TEXT').innerText = "✅ Admin";
        document.getElementById('ADMIN_TAB_BTN').classList.remove('hidden');
        closeModals();
        alert("Admin Access Granted!");
    } else { alert("Incorrect PIN"); }
}

async function saveNewMember() {
    let n = document.getElementById('NEW_M_NAME').value;
    let p = document.getElementById('NEW_
