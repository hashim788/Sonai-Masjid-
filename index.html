<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonai Masjid - Official Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="https://static.filestackapi.com/filestack-js/3.x.x/filestack.min.js"></script>

    <style>
        :root { --green: #062a18; --gold: #d4af37; --white: #ffffff; --bg: #f4f7f6; --red: #e74c3c; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: #333; overflow-x: hidden; padding-bottom: 100px; }

        /* 1. Splash Screen */
        #splash { position: fixed; inset: 0; background: var(--green); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; color: var(--gold); transition: 0.8s; }
        .spinner { width: 60px; height: 60px; border: 5px solid rgba(212, 175, 55, 0.2); border-top: 5px solid var(--gold); border-radius: 50%; animation: spin 1s linear infinite; margin-top: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* 2. Professional Header */
        .hdr { background: linear-gradient(135deg, var(--green), #0b4627); padding: 50px 20px; text-align: center; color: var(--gold); border-radius: 0 0 50px 50px; box-shadow: 0 15px 40px rgba(0,0,0,0.3); position: relative; }
        .ticker-wrap { background: #0b4627; color: var(--gold); padding: 12px 0; overflow: hidden; font-size: 14px; font-weight: bold; border-bottom: 2px solid var(--gold); }
        .ticker { display: flex; white-space: nowrap; animation: ticker 30s linear infinite; }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* 3. Stats & Search */
        .stats-box { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 15px; margin-top: 15px; display: flex; justify-content: space-around; color: white; font-size: 13px; border: 1px solid rgba(212,175,55,0.3); }
        .search-box { margin: -30px 20px 20px; position: relative; z-index: 10; }
        .search-box input { width: 100%; padding: 18px 25px; border-radius: 50px; border: none; box-shadow: 0 10px 25px rgba(0,0,0,0.2); font-size: 16px; outline: none; border: 1px solid #ddd; }

        /* 4. Navigation Tabs */
        .tabs { display: flex; padding: 10px 15px; gap: 10px; overflow-x: auto; scrollbar-width: none; }
        .tab-btn { padding: 12px 25px; border-radius: 30px; background: var(--white); border: 2px solid var(--green); color: var(--green); font-size: 14px; font-weight: 700; cursor: pointer; white-space: nowrap; transition: 0.3s; }
        .tab-btn.active { background: var(--green); color: var(--gold); box-shadow: 0 5px 15px rgba(6,42,24,0.3); }

        /* 5. Cards & Sections */
        .section-title { margin: 20px 20px 10px; font-weight: 700; color: var(--green); display: flex; align-items: center; gap: 10px; }
        .card { background: var(--white); margin: 12px 15px; padding: 20px; border-radius: 25px; display: flex; align-items: center; gap: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.06); transition: 0.3s; position: relative; }
        .m-img { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; border: 3px solid var(--gold); background: #f9f9f9; }
        .m-info { flex: 1; }
        .m-info h4 { font-size: 17px; color: var(--green); margin-bottom: 4px; }
        .m-amt { text-align: right; font-weight: 800; color: var(--green); font-size: 20px; }
        
        /* Campaign Card */
        .camp-card { background: linear-gradient(45deg, var(--green), #0b4627); color: var(--gold); border: none; }
        .camp-card h4 { color: var(--gold) !important; }

        /* Admin UI */
        #ADMIN_UI { background: #fff; margin: 15px; padding: 25px; border-radius: 30px; border: 3px solid var(--gold); display: none; animation: slideDown 0.5s ease; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        .admin-form-group { margin-bottom: 15px; }
        .admin-form-group label { font-size: 12px; font-weight: bold; color: #555; display: block; margin-bottom: 5px; }

        /* Bottom Nav */
        .btm-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; padding: 15px 0; box-shadow: 0 -10px 30px rgba(0,0,0,0.1); z-index: 1000; border-radius: 30px 30px 0 0; }
        .nav-item { flex: 1; text-align: center; font-size: 12px; font-weight: 700; color: #aaa; cursor: pointer; transition: 0.3s; }
        .nav-item.active { color: var(--green); transform: translateY(-5px); }

        .hidden { display: none !important; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .modal { background: white; width: 100%; max-width: 400px; padding: 35px; border-radius: 40px; text-align: center; }
    </style>
</head>
<body>

<div id="splash">
    <h1 style="font-family:'Amiri'; font-size: 50px;">Sonai Masjid</h1>
    <p>بِسْمِ اللهِ الرَّحْمٰنِ الرَّحِيْمِ</p>
    <div class="spinner"></div>
</div>

<div class="ticker-wrap"><div class="ticker" id="LIVE_TICKER">No recent donations...</div></div>

<div class="hdr">
    <h2 style="font-family:'Amiri'; font-size: 35px;">Sonai Masjid Portal</h2>
    <div class="stats-box">
        <div><p>Total Collection</p><h3 id="TOTAL_COLL">₹0</h3></div>
        <div style="border-left: 1px solid rgba(255,255,255,0.2); height: 30px;"></div>
        <div><p>Active Campaigns</p><h3 id="ACTIVE_CAMPS">0</h3></div>
    </div>
</div>

<div class="search-box">
    <input type="text" id="SEARCH_INPUT" placeholder="Search by name or number..." oninput="renderApp()">
</div>

<div class="tabs">
    <button class="tab-btn active" onclick="switchTab('members', this)">👥 Members</button>
    <button class="tab-btn" onclick="switchTab('campaigns', this)">📁 Campaigns</button>
    <button class="tab-btn" onclick="switchTab('expenses', this)">💸 Expenses</button>
</div>

<div id="ADMIN_UI">
    <h3 style="color:var(--green); margin-bottom:15px; border-bottom:2px solid var(--gold);">🛠 Admin Controls</h3>
    
    <div class="admin-form-group">
        <label>MEMBER MANAGEMENT</label>
        <input type="text" id="NEW_M_NAME" placeholder="Full Name">
        <input type="number" id="NEW_M_PHONE" placeholder="10 Digit Phone">
        <button class="tab-btn active" style="width:100%; border:none;" onclick="saveNewMember()">🚀 Add Member</button>
    </div>

    <div class="admin-form-group" style="margin-top:20px; border-top:1px dashed #ddd; pt:15px;">
        <label>CAMPAIGN MANAGEMENT</label>
        <input type="text" id="CAMP_NAME" placeholder="Campaign Name (e.g. Roof Work)">
        <button class="tab-btn" style="width:100%; background:var(--gold); color:var(--green);" onclick="createCampaign()">✨ Create Campaign</button>
    </div>
</div>

<div id="MAIN_CONTENT"></div>

<div id="LOGIN_MODAL" class="overlay hidden">
    <div class="modal">
        <h2 style="color:var(--green);">Admin Login</h2>
        <input type="password" id="ADMIN_PIN" placeholder="Enter Secure PIN">
        <button class="tab-btn active" style="width:100%; border:none; mt:10px;" onclick="login()">Login</button>
        <button onclick="closeModals()" style="background:none; border:none; margin-top:15px; color:gray;">Cancel</button>
    </div>
</div>

<div id="EDIT_MODAL" class="overlay hidden">
    <div class="modal">
        <h3>Edit Details</h3>
        <input type="hidden" id="EDIT_ID">
        <p id="EDIT_NAME_LBL" style="font-weight:bold; margin:10px 0;"></p>
        <input type="number" id="EDIT_AMT" placeholder="Update Amount ₹">
        <button class="tab-btn" style="width:100%; margin:10px 0;" onclick="uploadPhoto()">📸 Change Photo</button>
        <input type="hidden" id="EDIT_URL">
        <button class="tab-btn active" style="width:100%; border:none;" onclick="saveEdit()">Save Changes</button>
        <button onclick="closeModals()" style="background:none; border:none; margin-top:15px; color:gray;">Close</button>
    </div>
</div>

<div class="btm-nav">
    <div class="nav-item active" onclick="location.reload()">🏠 Home</div>
    <div class="nav-item" onclick="alert('Scan Masjid QR to Donate')">💳 Donate</div>
    <div id="ADMIN_LINK" class="nav-item" onclick="openLogin()">⚙️ Admin</div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBELYt4Rfu5vmoJzR9hfxkbSEER4XErIoU",
  authDomain: "sonai-masjid.firebaseapp.com",
  projectId: "sonai-masjid",
  storageBucket: "sonai-masjid.firebasestorage.app",
  messagingSenderId: "680124332445",
  appId: "1:680124332445:web:e5ce79dc635f971f035774"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const client = filestack.init('A8v0D5L4SiaWz9vW6p8Kgz');

let data = { members: [], campaigns: [], expenses: [] };
let currentTab = 'members';
let isAdmin = false;

window.onload = () => {
    setTimeout(() => document.getElementById('splash').style.display='none', 2000);
    loadAllData();
};

function loadAllData() {
    // Load Members
    db.collection("members").onSnapshot(s => {
        data.members = s.docs.map(d => ({id: d.id, ...d.data()}));
        renderApp();
    });
    // Load Campaigns
    db.collection("campaigns").onSnapshot(s => {
        data.campaigns = s.docs.map(d => ({id: d.id, ...d.data()}));
        renderApp();
    });
}

function switchTab(tab, btn) {
    currentTab = tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderApp();
}

function renderApp() {
    const container = document.getElementById('MAIN_CONTENT');
    const search = document.getElementById('SEARCH_INPUT').value.toLowerCase();
    
    // Stats Update
    const total = data.members.reduce((s, m) => s + (Number(m.paidAmount) || 0), 0);
    document.getElementById('TOTAL_COLL').innerText = `₹${total}`;
    document.getElementById('ACTIVE_CAMPS').innerText = data.campaigns.length;

    let html = '';

    if (currentTab === 'members') {
        let filtered = data.members.filter(m => m.name.toLowerCase().includes(search) || m.phone.includes(search));
        filtered.sort((a,b) => (b.paidAmount > 0) - (a.paidAmount > 0));
        html = filtered.map(m => `
            <div class="card" onclick="${isAdmin ? `openEdit('${m.id}')` : ''}">
                <img src="${m.photo || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}" class="m-img">
                <div class="m-info">
                    <h4>${m.name}</h4>
                    <p>📞 ${m.phone.slice(0,6)}****</p>
                    <span style="color:${m.paidAmount > 0 ? 'green':'red'}; font-size:10px; font-weight:bold;">
                        ${m.paidAmount > 0 ? '● PAID' : '● PENDING'}
                    </span>
                </div>
                <div class="m-amt">₹${m.paidAmount || 0}</div>
            </div>
        `).join('');
    } else if (currentTab === 'campaigns') {
        html = data.campaigns.map(c => `
            <div class="card camp-card">
                <div class="m-info">
                    <h4>📁 ${c.name}</h4>
                    <p style="color:white; opacity:0.8;">Status: Active</p>
                </div>
                <div class="m-amt">LIVE</div>
            </div>
        `).join('');
    } else {
        html = `<p style="text-align:center; padding:50px;">Expenses list is empty.</p>`;
    }

    container.innerHTML = html || `<p style="text-align:center; padding:50px;">No data found.</p>`;
}

// Admin Functions
function openLogin() { document.getElementById('LOGIN_MODAL').classList.remove('hidden'); }
function closeModals() { document.querySelectorAll('.overlay').forEach(o => o.classList.add('hidden')); }

function login() {
    if(document.getElementById('ADMIN_PIN').value === "masjid786") {
        isAdmin = true;
        document.getElementById('ADMIN_UI').style.display = 'block';
        document.getElementById('ADMIN_LINK').innerHTML = "✅ Admin";
        closeModals();
        renderApp();
        alert("Admin Access Granted!");
    } else { alert("Wrong PIN!"); }
}

async function saveNewMember() {
    const name = document.getElementById('NEW_M_NAME').value;
    const phone = document.getElementById('NEW_M_PHONE').value;
    if(!name || !phone) return alert("Fill all fields");
    await db.collection("members").add({ name, phone, paidAmount: 0, photo: "", time: Date.now() });
    alert("Member Added!");
}

async function createCampaign() {
    const name = document.getElementById('CAMP_NAME').value;
    if(!name) return alert("Enter name");
    await db.collection("campaigns").add({ name, status: "active", time: Date.now() });
    alert("Campaign Created!");
    document.getElementById('CAMP_NAME').value = '';
}

function openEdit(id) {
    const m = data.members.find(x => x.id === id);
    document.getElementById('EDIT_ID').value = id;
    document.getElementById('EDIT_NAME_LBL').innerText = m.name;
    document.getElementById('EDIT_AMT').value = m.paidAmount;
    document.getElementById('EDIT_URL').value = m.photo;
    document.getElementById('EDIT_MODAL').classList.remove('hidden');
}

function uploadPhoto() {
    client.picker({ onUploadDone: r => {
        document.getElementById('EDIT_URL').value = r.filesUploaded[0].url;
        alert("Photo Selected!");
    }}).open();
}

async function saveEdit() {
    const id = document.getElementById('EDIT_ID').value;
    const paidAmount = Number(document.getElementById('EDIT_AMT').value);
    const photo = document.getElementById('EDIT_URL').value;
    await db.collection("members").doc(id).update({ paidAmount, photo });
    alert("Updated!");
    closeModals();
}
</script>
</body>
</html>
