<!DOCTYPE html>
<html lang="ur" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0d4a1f">
<title>Sonai Masjid — Collection Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Noto+Nastaliq+Urdu&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://static.filestackapi.com/filestack-js/3.x.x/filestack.min.js"></script>

<style>
/* ═══════════════════════════════════════
   ROOT VARIABLES & RESET (Same as before)
═══════════════════════════════════════ */
:root {
  --g1:#0a3015; --g2:#0f4a1f; --g3:#1a6b3a; --g4:#25a05a; --g5:#2ecc71;
  --gold:#c9a84c; --gold2:#e8c86a; --gold3:#f5e09a;
  --bg:#f0ede4; --card:#fffef9; --card2:#f8f6f0;
  --text:#1a1a1a; --text2:#444; --muted:#888;
  --border:#e0dcd0; --border2:#d0ccc0;
  --paid:#1a6b3a; --pending:#c0392b; --pending-bg:#fdf0ee;
  --shadow:0 4px 20px rgba(0,0,0,0.08);
  --shadow2:0 8px 32px rgba(0,0,0,0.14);
  --radius:16px; --radius2:12px; --radius3:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow-x:hidden;}
body{font-family:'Poppins',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;}
button{font-family:'Poppins',sans-serif;cursor:pointer;border:none;outline:none;}
input,select,textarea{font-family:'Poppins',sans-serif;outline:none;}
img{max-width:100%;display:block;}

/* SPLASH SCREEN */
#splash { position:fixed;inset:0;z-index:9999; background:linear-gradient(160deg,var(--g1) 0%,var(--g2) 40%,var(--g3) 100%); display:flex;flex-direction:column;align-items:center;justify-content:center; transition:opacity .6s ease; }
#splash .splash-icon{font-size:72px;margin-bottom:20px;animation:pulse 2s infinite;}
#splash .splash-bismillah{font-family:'Amiri',serif;font-size:22px;color:var(--gold2);text-align:center;margin-bottom:8px;}
#splash h1{font-family:'Amiri',serif;font-size:36px;color:#fff;font-weight:700;text-align:center;}
#splash p{color:rgba(255,255,255,.65);font-size:13px;margin-bottom:40px;}
.splash-spinner{width:44px;height:44px;border:3px solid rgba(255,255,255,.2);border-top-color:var(--gold2);border-radius:50%;animation:spin .9s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.08);}}

/* LOGIN OVERLAY */
#loginOverlay{position:fixed;inset:0;z-index:999;background:rgba(0,0,0,.82);display:none;align-items:center;justify-content:center;backdrop-filter:blur(6px);}
#loginOverlay.show{display:flex;}
.login-card{background:var(--card);border-radius:24px;padding:36px 28px;width:92%;max-width:360px;text-align:center;box-shadow:0 24px 64px rgba(0,0,0,.4);animation:slideUp .3s ease;}
@keyframes slideUp{from{transform:translateY(30px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.login-card h2{font-family:'Amiri',serif;font-size:22px;color:var(--g3);margin-bottom:4px;}
.pin-input{width:100%;padding:14px;border:2px solid var(--border2);border-radius:var(--radius2);font-size:20px;text-align:center;letter-spacing:6px;background:var(--bg);margin-bottom:8px;}
.login-err{color:var(--pending);font-size:12px;margin-bottom:12px;display:none;}
.btn-primary{width:100%;padding:14px;background:linear-gradient(135deg,var(--g3),var(--g1));color:#fff;border-radius:var(--radius2);font-size:14px;font-weight:700;margin-bottom:10px;}
.btn-ghost{width:100%;padding:12px;background:transparent;color:var(--muted);border:1.5px solid var(--border2);border-radius:var(--radius2);font-size:13px;font-weight:600;}

/* MAIN APP */
#app{display:none;min-height:100vh;padding-bottom:80px;}
#app.show{display:block;}

/* HEADER */
.app-header{background:linear-gradient(160deg,var(--g1) 0%,var(--g2) 50%,var(--g3) 100%);padding:20px 16px 28px;position:relative;}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.header-logo h1{font-family:'Amiri',serif;font-size:22px;color:#fff;font-weight:700;}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;font-weight:600;padding:3px 10px;border-radius:20px;}
.badge-gold{background:var(--gold);color:#1a1a1a;}
.badge-live{background:#25D366;color:#fff;}
.badge-mode{background:rgba(255,255,255,.2);color:#fff;}

/* GLOBAL STATS */
.global-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:0 16px;margin-top:-16px;position:relative;z-index:2;}
.gstat{background:var(--card);border-radius:var(--radius2);padding:14px 8px;text-align:center;border:1px solid var(--border);box-shadow:var(--shadow);}
.gstat .v{font-size:18px;font-weight:800;}
.gstat .l{font-size:9.5px;color:var(--muted);margin-top:3px;}

/* NAV BOTTOM */
.nav-bottom{position:fixed;bottom:0;left:0;right:0;z-index:100;background:var(--card);border-top:1px solid var(--border);display:flex;padding:6px 8px 10px;gap:4px;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:8px 4px;color:var(--muted);font-size:10px;font-weight:600;}
.nav-btn.active{background:var(--g3);color:#fff;border-radius:var(--radius3);}

/* PAGES */
.page{display:none;padding:16px 16px 0;animation:fadeIn .25s ease;}
.page.active{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

.sec-title{font-size:13.5px;font-weight:700;color:var(--g3);display:flex;align-items:center;gap:6px;margin-bottom:12px;}
.sec-title::after{content:'';flex:1;height:1px;background:var(--border);}

/* SEARCH BAR */
.search-wrap{margin-bottom:14px;position:relative;}
.search-input{width:100%;padding:12px 16px 12px 42px;border:1.5px solid var(--border2);border-radius:var(--radius);background:var(--card);font-size:13px;}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:16px;color:var(--muted);}

/* CAMPAIGN CARDS */
.camp-card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);margin-bottom:12px;overflow:hidden;box-shadow:var(--shadow);}
.camp-header{padding:14px 16px 10px;}
.camp-ico{width:46px;height:46px;border-radius:14px;background:linear-gradient(135deg,var(--g3),var(--g1));display:flex;align-items:center;justify-content:center;font-size:22px;}
.prog-bar{height:8px;background:#e8e4d8;border-radius:10px;overflow:hidden;margin-bottom:5px;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--g3),var(--gold));transition:width .6s ease;}
.camp-num{flex:1;background:var(--bg);border-radius:var(--radius3);padding:8px 4px;text-align:center;}
.camp-num .v{font-size:14px;font-weight:800;color:var(--g3);}

/* MEMBER CARDS */
.member-card{background:var(--card);border-radius:var(--radius2);border:1px solid var(--border);padding:12px;margin-bottom:8px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow);}
.member-avatar{position:relative;flex-shrink:0;}
.avatar-img{width:50px;height:50px;border-radius:50%;object-fit:cover;border:2px solid var(--border2);}
.avatar-placeholder{width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#fff;}
.cam-btn{position:absolute;bottom:-2px;right:-2px;width:18px;height:18px;border-radius:50%;background:var(--g3);color:#fff;font-size:9px;display:flex;align-items:center;justify-content:center;border:2px solid #fff;}

/* FORMS */
.fi{width:100%;padding:11px 14px;border:1.5px solid var(--border2);border-radius:var(--radius3);font-size:13px;background:var(--bg);margin-bottom:8px;}
.submit-btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--g3),var(--g1));color:#fff;border-radius:var(--radius3);font-size:13px;font-weight:700;margin-top:4px;}

/* TICKER */
.ticker-wrap{background:linear-gradient(90deg,var(--g1),var(--g2));padding:8px 0;overflow:hidden;margin-top:12px;}
.ticker-inner{display:flex;gap:40px;animation:ticker 30s linear infinite;white-space:nowrap;}
@keyframes ticker{0%{transform:translateX(0);}100%{transform:translateX(-50%);}}

/* MODAL */
.modal-overlay{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.75);display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.modal-overlay.show{display:flex;}
.modal-box{background:var(--card);border-radius:var(--radius);padding:24px 20px;width:94%;max-width:420px;max-height:90vh;overflow-y:auto;}

.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(60px);background:#1a1a1a;color:#fff;padding:10px 22px;border-radius:30px;font-size:13px;z-index:999;transition:transform .3s ease;}
.toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div id="splash">
  <div class="splash-icon">🕌</div>
  <div class="splash-bismillah">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>
  <h1>Sonai Masjid</h1>
  <p>Campaign & Collection Manager</p>
  <div class="splash-spinner"></div>
</div>

<div id="loginOverlay">
  <div class="login-card">
    <h2>Sonai Masjid</h2>
    <p>Admin PIN daalo.</p>
    <input type="password" class="pin-input" id="pinInput" placeholder="••••••" maxlength="10"/>
    <div class="login-err" id="loginErr">❌ Galat PIN!</div>
    <button class="btn-primary" onclick="doLogin()">🔐 Login</button>
    <button class="btn-ghost" onclick="doView()">👁️ Sirf Dekhna</button>
  </div>
</div>

<div class="modal-overlay" id="addMemberModal">
  <div class="modal-box">
    <h3>👤 Naya Member</h3>
    <input class="fi" type="text" id="nmName" placeholder="Naam *"/>
    <input class="fi" type="tel" id="nmPhone" placeholder="Phone Number"/>
    <input class="fi" type="number" id="nmAmount" placeholder="Amount ₹" value="500"/>
    <button class="submit-btn" onclick="addMember()">➕ Add Karo</button>
    <button class="btn-ghost" style="margin-top:8px; width:100%" onclick="closeModal('addMemberModal')">Band Karo</button>
  </div>
</div>

<div id="app">
  <div class="app-header">
    <div class="header-top">
      <div class="header-logo"><h1>Sonai Masjid</h1></div>
      <div>
        <span class="badge badge-live">🔴 Live</span>
        <span class="badge badge-mode" id="modeBadge">👁️ View</span>
      </div>
    </div>
  </div>

  <div class="global-stats" id="globalStats"></div>

  <div class="nav-bottom">
    <button class="nav-btn active" id="nav0" onclick="goPage(0)">🏠 Home</button>
    <button class="nav-btn" id="nav1" onclick="goPage(1)">📋 Campaigns</button>
    <button class="nav-btn admin-only" id="nav4" onclick="goPage(4)">👑 Admin</button>
  </div>

  <div class="page active" id="page0">
    <div class="sec-title">📊 Campaigns</div>
    <div id="homeCampList"></div>
  </div>

  <div class="page" id="page1">
    <div id="campListView">
       <button class="submit-btn admin-only" onclick="showModal('addCampModal')">➕ Naya Campaign</button>
       <div id="campList" style="margin-top:10px;"></div>
    </div>
    <div id="campDetailView" style="display:none;">
      <button onclick="backToCampList()">← Wapas</button>
      <div id="campDetailHeader"></div>
      <div id="memberList"></div>
      <button class="submit-btn admin-only" onclick="showModal('addMemberModal')">➕ Member Add</button>
    </div>
  </div>

  <div class="page" id="page4">
    <button class="submit-btn red" onclick="doLogout()">🚪 Admin Logout</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// --- FIREBASE CONFIG ---
var FB_CFG = {
  apiKey:"AIzaSyBELYt4Rfu5vmoJzR9hfxkbSEER4XErIoU",
  authDomain:"sonai-masjid.firebaseapp.com",
  projectId:"sonai-masjid",
  storageBucket:"sonai-masjid.firebasestorage.app",
  messagingSenderId:"680124332445",
  appId:"1:680124332445:web:e5ce79dc635f971f035774"
};
firebase.initializeApp(FB_CFG);
var db = firebase.firestore();

// --- FILESTACK CONFIG ---
const filestackClient = filestack.init('A8pS7pT7mR9G6vXz2Z4b5z');

var state = {
  isAdmin: false,
  curPage: 0,
  curCampId: null,
  campaigns: []
};

window.onload = function() {
  setTimeout(() => {
    document.getElementById('splash').style.opacity = '0';
    setTimeout(() => {
      document.getElementById('splash').style.display = 'none';
      document.getElementById('loginOverlay').classList.add('show');
    }, 600);
  }, 2000);
  startFirebaseListeners();
};

function startFirebaseListeners() {
  db.collection('campaigns').onSnapshot(snap => {
    state.campaigns = [];
    snap.forEach(doc => {
      let d = doc.data(); d.id = doc.id;
      state.campaigns.push(d);
    });
    renderAll();
  });
}

// --- IMAGE UPLOAD LOGIC (Filestack) ---
function uploadPhoto(campId, memberIdx) {
  if(!state.isAdmin) return;
  
  filestackClient.picker({
    accept: ['image/*'],
    maxFiles: 1,
    onUploadDone: (res) => {
      const url = res.filesUploaded[0].url;
      savePhotoToFirestore(campId, memberIdx, url);
    }
  }).open();
}

function savePhotoToFirestore(campId, idx, url) {
  let camp = state.campaigns.find(c => c.id === campId);
  let members = [...camp.members];
  members[idx].photo = url;
  
  db.collection('campaigns').doc(campId).update({ members: members })
    .then(() => showToast("✅ Photo Uploaded!"));
}

// --- UI RENDERING ---
function renderAll() {
  renderHomeCamps();
  renderGlobalStats();
  if(state.curCampId) renderCampDetail();
}

function renderHomeCamps() {
  let el = document.getElementById('homeCampList');
  el.innerHTML = state.campaigns.map(c => `
    <div class="camp-card" onclick="openCampaign('${c.id}')">
      <div class="camp-header">
        <div style="display:flex; gap:10px;">
          <div class="camp-ico">${c.icon || '🕌'}</div>
          <div>
            <div style="font-weight:700;">${c.name}</div>
            <div style="font-size:11px; color:#888;">${c.members ? c.members.length : 0} Members</div>
          </div>
        </div>
      </div>
    </div>
  `).join('');
}

function openCampaign(id) {
  state.curCampId = id;
  goPage(1);
  document.getElementById('campListView').style.display = 'none';
  document.getElementById('campDetailView').style.display = 'block';
  renderCampDetail();
}

function renderCampDetail() {
  let c = state.campaigns.find(x => x.id === state.curCampId);
  if(!c) return;
  
  // Sort Members: Paid first
  let sortedMembers = (c.members || []).map((m, i) => ({...m, originalIdx: i}));
  sortedMembers.sort((a, b) => (b.paid === a.paid) ? 0 : b.paid ? 1 : -1);

  document.getElementById('memberList').innerHTML = sortedMembers.map(m => `
    <div class="member-card">
      <div class="member-avatar">
        ${m.photo ? `<img src="${m.photo}" class="avatar-img">` : `<div class="avatar-placeholder" style="background:#1a6b3a">${m.name[0]}</div>`}
        ${state.isAdmin ? `<button class="cam-btn" onclick="uploadPhoto('${c.id}', ${m.originalIdx})">📷</button>` : ''}
      </div>
      <div style="flex:1">
        <div style="font-weight:700">${m.name}</div>
        <div style="font-size:12px; color:#666">₹${m.amount}</div>
      </div>
      <button class="badge ${m.paid ? 'badge-live' : 'badge-mode'}" onclick="togglePaid('${c.id}', ${m.originalIdx})">
        ${m.paid ? '✅ Paid' : '⏳ Pending'}
      </button>
    </div>
  `).join('');
}

function togglePaid(campId, idx) {
  if(!state.isAdmin) return;
  let camp = state.campaigns.find(c => c.id === campId);
  let members = [...camp.members];
  members[idx].paid = !members[idx].paid;
  db.collection('campaigns').doc(campId).update({ members: members });
}

function addMember() {
  let name = document.getElementById('nmName').value;
  let amount = document.getElementById('nmAmount').value;
  if(!name) return;

  let camp = state.campaigns.find(c => c.id === state.curCampId);
  let members = camp.members || [];
  members.push({ name: name, amount: parseInt(amount), paid: false, photo: '' });

  db.collection('campaigns').doc(state.curCampId).update({ members: members })
    .then(() => {
      closeModal('addMemberModal');
      document.getElementById('nmName').value = '';
    });
}

function doLogin() {
  if(document.getElementById('pinInput').value === 'masjid786') {
    state.isAdmin = true;
    document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'block');
    document.getElementById('loginOverlay').classList.remove('show');
    document.getElementById('app').classList.add('show');
  }
}
function doView() { document.getElementById('loginOverlay').classList.remove('show'); document.getElementById('app').classList.add('show'); }
function goPage(n) { document.querySelectorAll('.page').forEach((p, i) => p.classList.toggle('active', i === n)); }
function backToCampList() { document.getElementById('campListView').style.display = 'block'; document.getElementById('campDetailView').style.display = 'none'; state.curCampId = null; }
function showModal(id) { document.getElementById(id).classList.add('show'); }
function closeModal(id) { document.getElementById(id).classList.remove('show'); }
function showToast(m) { let t = document.getElementById('toast'); t.textContent = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000); }
function renderGlobalStats() {} 
function doLogout() { location.reload(); }
</script>
</body>
</html>
