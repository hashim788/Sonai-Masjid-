<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonai Masjid - Official Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="https://static.filestackapi.com/filestack-js/3.x.x/filestack.min.js"></script>

    <style>
        :root { --green: #062a18; --gold: #d4af37; --white: #ffffff; --bg: #f4f7f6; --red: #e74c3c; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: #333; overflow-x: hidden; padding-bottom: 90px; }

        /* 1. Splash Screen */
        #splash { position: fixed; inset: 0; background: var(--green); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; color: var(--gold); transition: 0.8s; }
        .spinner { width: 50px; height: 50px; border: 5px solid rgba(212, 175, 55, 0.2); border-top: 5px solid var(--gold); border-radius: 50%; animation: spin 1s linear infinite; margin-top: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* 2. Header & Live Ticker */
        .ticker-wrap { background: #0b4627; color: var(--gold); padding: 10px 0; overflow: hidden; font-size: 13px; font-weight: bold; border-bottom: 2px solid var(--gold); }
        .ticker { display: flex; white-space: nowrap; animation: ticker 25s linear infinite; }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        .hdr { background: linear-gradient(135deg, var(--green), #0b4627); padding: 45px 20px; text-align: center; color: var(--gold); border-radius: 0 0 45px 45px; box-shadow: 0 12px 35px rgba(0,0,0,0.3); }

        /* 3. Search & Filters */
        .search-box { margin: -28px 20px 20px; position: relative; z-index: 10; }
        .search-box input { width: 100%; padding: 16px 25px; border-radius: 50px; border: none; box-shadow: 0 8px 20px rgba(0,0,0,0.15); font-size: 15px; outline: none; }

        .filter-nav { display: flex; padding: 10px 15px; gap: 10px; overflow-x: auto; scrollbar-width: none; }
        .f-btn { padding: 12px 22px; border-radius: 25px; background: var(--white); border: 2px solid var(--green); color: var(--green); font-size: 13px; font-weight: 700; cursor: pointer; white-space: nowrap; transition: 0.3s; }
        .f-btn.active { background: var(--green); color: var(--gold); }

        /* 4. Admin Panel (Hidden by default) */
        #ADMIN_SECTION { background: white; margin: 15px; padding: 25px; border-radius: 25px; border: 3px solid var(--gold); display: none; }
        input, select { width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; border: 1.5px solid #ddd; font-size: 14px; }
        .primary-btn { width: 100%; padding: 16px; background: var(--green); color: var(--gold); border: none; border-radius: 15px; font-weight: bold; cursor: pointer; margin-top: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }

        /* 5. Member Cards */
        .card { background: var(--white); margin: 15px; padding: 18px; border-radius: 22px; display: flex; align-items: center; gap: 18px; box-shadow: 0 6px 15px rgba(0,0,0,0.06); position: relative; border-left: 5px solid transparent; }
        .card.is-paid { border-left-color: #27ae60; }
        .m-img { width: 65px; height: 65px; border-radius: 50%; object-fit: cover; border: 3px solid var(--gold); background: #f0f0f0; }
        .m-info { flex: 1; }
        .m-info h4 { font-size: 16px; color: var(--green); font-weight: 700; }
        .m-info p { font-size: 12px; color: #666; margin-top: 2px; }
        .m-amt { text-align: right; font-weight: 800; color: var(--green); font-size: 18px; }

        /* Modals */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .modal { background: white; width: 100%; max-width: 400px; padding: 35px; border-radius: 35px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }

        /* Bottom Nav */
        .btm-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; padding: 15px 0; box-shadow: 0 -8px 25px rgba(0,0,0,0.1); z-index: 1000; border-radius: 25px 25px 0 0; }
        .nav-item { flex: 1; text-align: center; font-size: 12px; font-weight: bold; color: #888; cursor: pointer; }
        .nav-item.active { color: var(--green); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="splash">
    <h1 style="font-family:'Amiri'; font-size: 45px;">Sonai Masjid</h1>
    <p style="letter-spacing: 2px;">بِسْمِ اللهِ الرَّحْمٰنِ الرَّحِيْمِ</p>
    <div class="spinner"></div>
</div>

<div class="ticker-wrap"><div class="ticker" id="LIVE_TICKER">Assalamu Alaikum... Loading Donation Data...</div></div>

<div class="hdr">
    <h2 style="font-family:'Amiri'; font-size: 32px;">Sonai Masjid Portal</h2>
    <div id="STATS_TOP" style="font-size: 13px; margin-top: 12px; background: rgba(255,255,255,0.1); padding: 8px; border-radius: 10px;">Total Collected: ₹0</div>
</div>

<div class="search-box">
    <input type="text" id="SEARCH_INPUT" placeholder="Search by name or number..." oninput="renderList()">
</div>

<div class="filter-nav">
    <button class="f-btn active" onclick="setFilter('all', this)">All Members</button>
    <button class="f-btn" onclick="setFilter('paid', this)">✅ Paid (Top)</button>
    <button class="f-btn" onclick="setFilter('unpaid', this)">❌ Unpaid</button>
</div>

<div id="ADMIN_SECTION">
    <h3 style="color: var(--green); border-bottom: 2px solid var(--gold); padding-bottom: 5px;">🔧 Admin Dashboard</h3>
    
    <div style="margin-top: 15px;">
        <p style="font-size: 12px; font-weight: bold; color: #555;">➕ ADD NEW MEMBER</p>
        <input type="text" id="NEW_M_NAME" placeholder="Enter Full Name">
        <input type="number" id="NEW_M_PHONE" placeholder="Mobile Number (10 digits)">
        <button class="primary-btn" onclick="saveNewMember()">🚀 Save to Database</button>
    </div>

    <div style="margin-top: 25px; border-top: 1px dashed #ccc; pt: 15px;">
        <p style="font-size: 12px; font-weight: bold; color: #555;">📁 CREATE CAMPAIGN</p>
        <input type="text" id="CAMP_NAME" placeholder="Campaign Name (e.g. Juma Chanda)">
        <button class="primary-btn" style="background:var(--gold); color:var(--green);" onclick="createCampaign()">✨ Launch Campaign</button>
    </div>
</div>

<div id="LIST_CONTAINER"></div>

<div id="LOGIN_MODAL" class="overlay hidden">
    <div class="modal">
        <h2 style="color: var(--green);">Admin Login</h2>
        <p style="font-size: 12px; margin-bottom: 15px;">Enter PIN to make changes</p>
        <input type="password" id="ADMIN_PIN" placeholder="Enter 6-Digit PIN">
        <button class="primary-btn" onclick="login()">Access Portal</button>
        <button onclick="closeModals()" style="background:none; border:none; margin-top:15px; color:gray; font-weight:bold;">Cancel</button>
    </div>
</div>

<div id="EDIT_MODAL" class="overlay hidden">
    <div class="modal">
        <h3>Update Contribution</h3>
        <input type="hidden" id="EDIT_ID">
        <p id="EDIT_NAME_LBL" style="font-weight:bold; color:var(--green); margin: 10px 0; font-size: 18px;"></p>
        <input type="number" id="EDIT_AMT" placeholder="Enter Amount ₹">
        <button class="f-btn" style="width:100%; margin:10px 0;" onclick="uploadMemberPhoto()">📸 Update Photo</button>
        <input type="hidden" id="EDIT_IMG_URL">
        <button class="primary-btn" onclick="saveMemberEdit()">Save Changes</button>
        <button onclick="closeModals()" style="background:none; border:none; margin-top:15px; color:gray;">Close</button>
    </div>
</div>

<div class="btm-nav">
    <div class="nav-item active" onclick="location.reload()">🏠 Home</div>
    <div class="nav-item" onclick="alert('Masjid UPI: sonai@upi\nAcc No: 123456789')">💳 Donate</div>
    <div id="ADMIN_LINK" class="nav-item" onclick="openLogin()">⚙️ Admin</div>
</div>

<script>
// --- CONFIGURATION ---
const firebaseConfig = {
  apiKey: "AIzaSyBELYt4Rfu5vmoJzR9hfxkbSEER4XErIoU",
  authDomain: "sonai-masjid.firebaseapp.com",
  projectId: "sonai-masjid",
  storageBucket: "sonai-masjid.firebasestorage.app",
  messagingSenderId: "680124332445",
  appId: "1:680124332445:web:e5ce79dc635f971f035774"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const client = filestack.init('A8v0D5L4SiaWz9vW6p8Kgz'); 

let allMembers = [];
let currentFilter = 'all';
let isAdmin = false;

// --- INITIALIZE ---
window.onload = () => {
    setTimeout(() => { 
        const s = document.getElementById('splash');
        if(s) s.style.opacity = '0'; 
        setTimeout(() => s.remove(), 800); 
    }, 2500);
    loadData();
};

function loadData() {
    db.collection("members").orderBy("time", "desc").onSnapshot(snap => {
        allMembers = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        renderList();
        updateStats();
        updateTicker();
    });
}

function renderList() {
    let searchTerm = document.getElementById('SEARCH_INPUT').value.toLowerCase();
    let filtered = allMembers.filter(m => 
        m.name.toLowerCase().includes(searchTerm) || 
        m.phone.includes(searchTerm)
    );

    // Filter Logic
    if (currentFilter === 'paid') filtered = filtered.filter(m => m.paidAmount > 0);
    if (currentFilter === 'unpaid') filtered = filtered.filter(m => (m.paidAmount || 0) === 0);

    // Sorting: Paid hamesha upar
    filtered.sort((a, b) => (Number(b.paidAmount) > 0) - (Number(a.paidAmount) > 0));

    let html = filtered.map(m => {
        let maskedPhone = m.phone.substring(0, 6) + "****";
        let isPaid = Number(m.paidAmount) > 0;
        return `
        <div class="card ${isPaid ? 'is-paid' : ''}" onclick="${isAdmin ? `openEdit('${m.id}')` : ''}">
            <img src="${m.photo || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}" class="m-img">
            <div class="m-info">
                <h4>${m.name}</h4>
                <p>📞 ${maskedPhone}</p>
                <p style="color:${isPaid ? '#27ae60' : '#e74c3c'}; font-weight:bold; font-size:10px;">
                    ${isPaid ? '● SUCCESSFUL PAYMENT' : '● PAYMENT PENDING'}
                </p>
            </div>
            <div class="m-amt">₹${m.paidAmount || 0}</div>
        </div>`;
    }).join('');
    
    document.getElementById('LIST_CONTAINER').innerHTML = html || "<p style='text-align:center; padding:40px; color:gray;'>No results found.</p>";
}

function updateStats() {
    let total = allMembers.reduce((s, m) => s + (Number(m.paidAmount) || 0), 0);
    document.getElementById('STATS_TOP').innerText = `Total Collected: ₹${total} | Verified Calculations`;
}

function updateTicker() {
    let recent = allMembers.filter(m => m.paidAmount > 0).slice(0, 5);
    let text = recent.map(m => `✨ ${m.name} contributed ₹${m.paidAmount}`).join('   •   ');
    document.getElementById('LIVE_TICKER').innerText = text || "Sonai Masjid - Official Donation Portal Live";
}

function setFilter(f, btn) {
    currentFilter = f;
    document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderList();
}

// --- ADMIN SYSTEM ---
function openLogin() { document.getElementById('LOGIN_MODAL').classList.remove('hidden'); }
function closeModals() { document.querySelectorAll('.overlay').forEach(o => o.classList.add('hidden')); }

function login() {
    if(document.getElementById('ADMIN_PIN').value === "masjid786") {
        isAdmin = true;
        alert("Admin Access Granted! You can now Add Members and Edit Payments.");
        document.getElementById('ADMIN_LINK').innerText = "✅ Admin Mode";
        document.getElementById('ADMIN_SECTION').style.display = 'block';
        closeModals();
        renderList();
        window.scrollTo(0,0);
    } else { alert("❌ Wrong PIN! Try again."); }
}

async function saveNewMember() {
    let name = document.getElementById('NEW_M_NAME').value;
    let phone = document.getElementById('NEW_M_PHONE').value;
    if(!name || phone.length < 10) return alert("Please enter correct Name and 10-digit Phone!");
    
    await db.collection("members").add({
        name: name, phone: phone, paidAmount: 0, photo: "", time: Date.now()
    });
    alert("✅ Member added to portal!");
    document.getElementById('NEW_M_NAME').value = '';
    document.getElementById('NEW_M_PHONE').value = '';
}

async function createCampaign() {
    let cname = document.getElementById('CAMP_NAME').value;
    if(!cname) return alert("Enter Campaign Name!");
    await db.collection("campaigns").add({ name: cname, status: "active", time: Date.now() });
    alert("✅ New Campaign Created!");
    document.getElementById('CAMP_NAME').value = '';
}

function openEdit(id) {
    let m = allMembers.find(x => x.id === id);
    document.getElementById('EDIT_ID').value = id;
    document.getElementById('EDIT_NAME_LBL').innerText = m.name;
    document.getElementById('EDIT_AMT').value = m.paidAmount;
    document.getElementById('EDIT_IMG_URL').value = m.photo || '';
    document.getElementById('EDIT_MODAL').classList.remove('hidden');
}

function uploadMemberPhoto() {
    client.picker({ 
        onUploadDone: (res) => {
            document.getElementById('EDIT_IMG_URL').value = res.filesUploaded[0].url;
            alert("Photo Uploaded Successfully!");
        } 
    }).open();
}

async function saveMemberEdit() {
    let id = document.getElementById('EDIT_ID').value;
    let amt = Number(document.getElementById('EDIT_AMT').value);
    let url = document.getElementById('EDIT_IMG_URL').value;
    await db.collection("members").doc(id).update({ paidAmount: amt, photo: url });
    alert("💾 Data Saved Successfully!");
    closeModals();
}
</script>

</body>
</html>
